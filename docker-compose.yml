version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      # Secret variables defined without values for Hostinger injection
      - SHOPIFY_WEBHOOK_SECRET
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SHOPIFY_API_ADMIN
      - SHOPIFY_API_KEY
      - SHOPIFY_API_SECRET
      - POSTHOG_API_KEY
      - POSTHOG_HOST
    depends_on:
      - redis

  worker:
    build: .
    command: npm run worker
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      # Secret variables defined without values for Hostinger injection
      - SHOPIFY_WEBHOOK_SECRET
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SHOPIFY_API_ADMIN
      - SHOPIFY_API_KEY
      - SHOPIFY_API_SECRET
      - POSTHOG_API_KEY
      - POSTHOG_HOST
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

# Note: ngrok is intentionally removed from the production setup as the VPS will handle external exposure.
